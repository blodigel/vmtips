apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vmtips
  namespace: default
  annotations:
    # Traefik routing
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # Basic auth middleware (create secret first)
    traefik.ingress.kubernetes.io/router.middlewares: default-vmtips-basic-auth@kubernetescrd
    # For HTTPS later (uncomment and add cert):
    # traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  rules:
    - host: vm.blodsnigel.se
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vmtips
                port:
                  number: 80
