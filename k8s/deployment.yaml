apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmtips
  labels:
    app: vmtips
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vmtips
  template:
    metadata:
      labels:
        app: vmtips
    spec:
      containers:
        - name: vmtips
          image: ghcr.io/blodigel/vmtips:latest   # Ändra om du använder annat repo-namn än "vmtips"
          imagePullPolicy: Always  # Viktigt med :latest + GH Actions så att den alltid hämtar senaste bilden vid rollout
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DB_PATH
              value: /data/vmtips.db
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vmtips-data
---
apiVersion: v1
kind: Service
metadata:
  name: vmtips
  labels:
    app: vmtips
spec:
  type: NodePort   # Enkelt för LAN – nås på nodens IP + port
  selector:
    app: vmtips
  ports:
    - port: 80
      targetPort: 8000
      nodePort: 30800   # Ändra om 30800 är upptagen
      protocol: TCP
      name: http
